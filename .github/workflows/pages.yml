name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A3C867: ${{ secrets.A3C867 }}
          B0FE97: ${{ secrets.B0FE97 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A3C867', '')
          meta_b = os.environ.get('B0FE97', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 48a0089cf97d8607d3ae7c2b773b1c6bd665 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 26972af834f79c0b9cbcda464e88fa41e7 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
